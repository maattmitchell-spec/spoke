kind = "mobile"
previewPath = "/"
title = "Spoke"
version = "1.0.0"
id = "artifacts/spoke"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 21180

[services.development]
run = "pnpm --filter @workspace/spoke run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/spoke", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/spoke", "run", "serve" ]

[services.env]
PORT = "21180"
BASE_PATH = "/"
